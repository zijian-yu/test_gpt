{% extends 'web/base.html' %}
{% block title %}{{ portal_title }} - Multi-Omics BioDB{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ portal_title }}</h1>
  <p>这是 {{ portal_title }} 的门户页面，提供该领域的数据浏览、筛选、下载与分析入口。</p>
  <ul>
    <li>支持按基因ID、样本ID、组织来源与实验条件检索</li>
    <li>提供统计汇总、结果导出、API访问说明</li>
    <li>可联动到基因详情页进行跨组学联合查看</li>
  </ul>
</div>
{% endblock %}
